<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAHWEH the HAPORETS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Serif+KR:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --main-bg: #363b3f; --accent: #ffffff; }
        * { font-weight: 900 !important; color: var(--accent); letter-spacing: -0.5px; }
        body { background-color: var(--main-bg); font-family: 'Noto Serif KR', serif; overflow-x: hidden; }
        .font-title { font-family: 'Cinzel Decorative', cursive; }
        .btn-main { border: 4px solid var(--accent); transition: 0.2s; background: transparent; display: flex; align-items: center; justify-content: center; width: 100%; }
        .btn-main:hover { background-color: var(--accent); color: var(--main-bg) !important; }
        /* 마감 스타일: 빨간색 테두리와 글자, 어두워지지 않음 */
        .btn-main:disabled { border-color: #ff4d4d; color: #ff4d4d !important; cursor: not-allowed; opacity: 1 !important; }
        .input-heavy { border-bottom: 5px solid var(--accent) !important; background: transparent; outline: none; border-top:0; border-left:0; border-right:0; border-radius: 0; color: white !important; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="landing" class="flex flex-col items-center justify-center min-h-screen p-6 text-center">
        <img src="crest.png.png" alt="Main Crest" class="w-48 md:w-64 mb-10 opacity-90">
        <h1 class="font-title text-4xl md:text-6xl mb-2 tracking-widest">YAHWEH <span class="italic text-2xl">the</span></h1>
        <h2 class="font-title text-5xl md:text-8xl mb-12 uppercase tracking-widest">Haporets</h2>
        <div class="max-w-2xl mb-12 space-y-6 opacity-90 font-light leading-relaxed text-lg">
            <p>길을 여는 자가 그들 앞에 올라가고 그들은 길을 열어 성문에 이르러서는 그리로 나갈 것이며 그들의 왕이 앞서 가며 여호와께서는 선두로 가시리라</p>
        </div>
        <button onclick="enterApp()" class="btn-main px-20 py-8 rounded-full text-3xl italic uppercase w-auto">상담 신청하기</button>
        <div class="mt-20 text-sm tracking-[0.3em] opacity-40 font-title uppercase">Winter ☧ 2026</div>
    </div>

    <div id="main" class="hidden max-w-[1200px] mx-auto p-6 py-20 text-center">
        <div class="flex flex-col gap-24">
            <div id="friday-section">
                <img src="ark.png.png" alt="Friday" class="w-24 mx-auto mb-6 opacity-80">
                <h2 class="font-title text-4xl mb-10 border-b-4 border-white inline-block px-10 pb-2">FRIDAY</h2>
                <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-7 gap-4">
                    <script>
                        ['15:00','15:30','16:00','16:30','17:00','17:30','19:00'].forEach(t => {
                            document.write(`<button onclick="openForm('금요일', '${t}')" class="btn-main py-4 rounded-2xl text-xl" data-key="금요일_${t}">${t}</button>`);
                        });
                    </script>
                </div>
            </div>

            <div id="saturday-section">
                <img src="crown.png.png" alt="Saturday" class="w-32 mx-auto mb-6 opacity-80">
                <h2 class="font-title text-5xl mb-10 border-b-4 border-white inline-block px-14 pb-2">SATURDAY</h2>
                <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-4">
                    <script>
                        ['10:00','10:30','11:00','11:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','19:00'].forEach(t => {
                            document.write(`<button onclick="openForm('토요일', '${t}')" class="btn-main py-5 rounded-3xl text-xl" data-key="토요일_${t}">${t}</button>`);
                        });
                    </script>
                </div>
            </div>

            <div id="sunday-section">
                <img src="shofar.png.png" alt="Sunday" class="w-24 mx-auto mb-6 opacity-80">
                <h2 class="font-title text-4xl mb-10 border-b-4 border-white inline-block px-10 pb-2">SUNDAY</h2>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 max-w-2xl mx-auto">
                    <script>
                        ['10:00','10:30','11:00','11:30'].forEach(t => {
                            document.write(`<button onclick="openForm('일요일', '${t}')" class="btn-main py-4 rounded-2xl text-xl" data-key="일요일_${t}">${t}</button>`);
                        });
                    </script>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-xl flex items-center justify-center p-4 z-50">
        <div class="bg-[#363b3f] p-10 rounded-[50px] w-full max-w-lg border-[6px] border-white text-center">
            <h2 id="modal-title" class="font-title text-3xl mb-10 italic border-2 border-white rounded-full py-2 px-6 inline-block"></h2>
            <form id="applyForm" class="space-y-8 text-left">
                <input type="hidden" id="f-day">
                <input type="hidden" id="f-time">
                <input type="text" id="f-name" placeholder="이름" required minlength="2" class="input-heavy w-full p-3 text-2xl">
                <input type="number" id="f-age" placeholder="나이" min="1" max="120" required class="input-heavy w-full p-3 text-2xl">
                <input type="text" id="f-attic" placeholder="다락방 (예: 홍길동)" required class="input-heavy w-full p-3 text-2xl">
                <input type="tel" id="f-phone" placeholder="연락처 (숫자 11자리)" required pattern="[0-9]{11}" class="input-heavy w-full p-3 text-2xl">
                <div class="flex gap-12 justify-center py-4 text-2xl">
                    <label class="flex items-center gap-3"><input type="radio" name="gender" value="남자" required class="w-8 h-8"> 남자</label>
                    <label class="flex items-center gap-3"><input type="radio" name="gender" value="여자" class="w-8 h-8"> 여자</label>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeForm()" class="flex-1 py-5 border-[4px] border-white rounded-3xl text-2xl">취소</button>
                    <button type="submit" id="submitBtn" class="flex-1 py-5 bg-white text-[#363b3f] rounded-3xl text-2xl">신청하기</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBa66Q5Ap0btmupxISOQfNsV8y5JUQAG2o",
            authDomain: "kimhoin.firebaseapp.com",
            projectId: "kimhoin",
            storageBucket: "kimhoin.firebasestorage.app",
            messagingSenderId: "143951884772",
            appId: "1:143951884772:web:991545d9577a7a634c17f1",
            measurementId: "G-FZDNYD4QCT"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. 실시간 마감 감시
        db.collection("appointments").onSnapshot((snapshot) => {
            const closedSlots = {};
            snapshot.forEach((doc) => {
                const data = doc.data();
                closedSlots[`${data.day}_${data.time}`] = true;
            });
            document.querySelectorAll('[data-key]').forEach(btn => {
                const key = btn.getAttribute('data-key');
                const timeOnly = key.split('_')[1];
                if(closedSlots[key]) {
                    btn.disabled = true;
                    btn.innerText = `${timeOnly} (신청 마감)`;
                } else {
                    btn.disabled = false;
                    btn.innerText = timeOnly;
                }
            });
        });

        // 2. 화면 전환 및 모달 제어
        function enterApp() { document.getElementById('landing').classList.add('hidden'); document.getElementById('main').classList.remove('hidden'); window.scrollTo(0,0); }
        function openForm(d, t) { 
            document.getElementById('f-day').value = d; 
            document.getElementById('f-time').value = t; 
            document.getElementById('modal-title').innerText = `${d} ${t}`; 
            document.getElementById('modal').classList.remove('hidden'); 
            document.body.style.overflow = 'hidden';
        }
        function closeForm() { 
            document.getElementById('modal').classList.add('hidden'); 
            document.body.style.overflow = 'auto';
        }

        // 3. 신청 제출 (중복 체크 포함)
        document.getElementById('applyForm').addEventListener('submit', async e => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const day = document.getElementById('f-day').value;
            const time = document.getElementById('f-time').value;
            btn.disabled = true; btn.innerText = "처리 중...";

            try {
                const q = await db.collection("appointments").where("day", "==", day).where("time", "==", time).get();
                if (!q.empty) { alert("그 사이에 마감되었습니다!"); btn.disabled = false; return; }

                await db.collection("appointments").add({
                    day: day, time: time,
                    name: document.getElementById('f-name').value,
                    age: document.getElementById('f-age').value,
                    attic: document.getElementById('f-attic').value + " 다락방",
                    phone: document.getElementById('f-phone').value,
                    gender: document.querySelector('input[name="gender"]:checked').value,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("신청이 완료되었습니다!");
                closeForm();
            } catch (err) { alert("오류: " + err.message); }
            finally { btn.disabled = false; btn.innerText = "신청하기"; }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상담 신청</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 모든 글자, 숫자 최강 볼드(900) */
        * { font-weight: 900 !important; color: #ffffff; letter-spacing: -1px; }
        body { background-color: #000000; font-family: 'Pretendard', sans-serif; overflow-x: hidden; }
        
        /* 테두리 6px 초강력 강화 */
        .border-heavy { border: 6px solid #ffffff; }
        .input-heavy { border-bottom: 6px solid #000000 !important; border-top:0; border-left:0; border-right:0; }
        
        /* 버튼 디자인 */
        .btn-main { border: 4px solid #ffffff; transition: 0.1s; display: flex; align-items: center; justify-content: center; width: 100%; }
        .btn-main:hover { background-color: #ffffff; color: #000000 !important; }
        
        /* 마감 버튼 스타일: 어두워지지 않고 테두리색만 변경 */
        .btn-main:disabled { 
            cursor: not-allowed; 
            background-color: #000000; 
            border-color: #ff0000; /* 마감은 빨간색 테두리로 포인트 */
            color: #ff0000 !important; 
        }

        .modal-capsule {
            background-color: #000000;
            color: #ffffff !important;
            padding: 14px 40px;
            border-radius: 9999px;
            display: inline-block;
            margin-bottom: 30px;
        }

        .hidden { display: none; }
        input { color: #000000 !important; font-weight: 900 !important; }
        input::placeholder { color: #666666 !important; }
    </style>
</head>
<body>

    <div id="landing" class="flex items-center justify-center min-h-screen">
        <button onclick="enterApp()" class="btn-main px-24 py-12 rounded-full text-4xl uppercase italic shadow-2xl w-auto">
            상담 신청하기
        </button>
    </div>

    <div id="main" class="hidden max-w-[1200px] mx-auto p-4 animate-fade-in">
        <div class="flex flex-col gap-10 mt-10 text-center">
            
            <div class="border-heavy p-6 rounded-[40px]">
                <h2 class="text-3xl mb-6 bg-white text-black px-10 py-1 rounded-full inline-block !color-black">금요일</h2>
                <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-7 gap-4">
                    <script>
                        ['15:00','15:30','16:00','16:30','17:00','17:30','19:00'].forEach(t => {
                            document.write(`<button onclick="openForm('금요일', '${t}')" class="btn-main py-4 rounded-2xl text-xl" data-key="금요일_${t}">${t}</button>`);
                        });
                    </script>
                </div>
            </div>

            <div class="border-heavy p-8 rounded-[50px]">
                <h2 class="text-4xl mb-8 bg-white text-black px-14 py-2 rounded-full inline-block !color-black">토요일</h2>
                <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-4">
                    <script>
                        ['10:00','10:30','11:00','11:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','19:00'].forEach(t => {
                            document.write(`<button onclick="openForm('토요일', '${t}')" class="btn-main py-5 rounded-3xl text-xl" data-key="토요일_${t}">${t}</button>`);
                        });
                    </script>
                </div>
            </div>

            <div class="border-heavy p-6 rounded-[40px]">
                <h2 class="text-3xl mb-6 bg-white text-black px-10 py-1 rounded-full inline-block !color-black">일요일</h2>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                    <script>
                        ['10:00','10:30','11:00','11:30'].forEach(t => {
                            document.write(`<button onclick="openForm('일요일', '${t}')" class="btn-main py-4 rounded-2xl text-xl" data-key="일요일_${t}">${t}</button>`);
                        });
                    </script>
                </div>
            </div>

        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-white/10 backdrop-blur-2xl flex items-center justify-center p-4 z-50">
        <div class="bg-white p-12 rounded-[60px] w-full max-w-lg shadow-2xl border-[8px] border-black text-black">
            <div class="text-center">
                <span id="modal-title" class="modal-capsule text-3xl font-black italic"></span>
            </div>
            
            <form id="applyForm" class="space-y-8 text-black">
                <input type="hidden" name="day" id="f-day">
                <input type="hidden" name="time" id="f-time">
                
                <input type="text" name="name" placeholder="이름" required minlength="2" class="input-heavy text-black text-2xl p-4 outline-none w-full !text-black">
                <input type="number" name="age" placeholder="나이" min="1" max="120" required class="input-heavy text-black text-2xl p-4 outline-none w-full !text-black">
                <input type="text" name="attic" placeholder="다락방 (예: 홍길동)" required class="input-heavy text-black text-2xl p-4 outline-none w-full !text-black">
                <input type="tel" name="phone" placeholder="연락처 (01012345678)" required pattern="[0-9]{11}" title="번호만 11자리 입력해주세요." class="input-heavy text-black text-2xl p-4 outline-none w-full !text-black">
                
                <div class="flex gap-12 justify-center py-4 text-black">
                    <label class="flex items-center gap-4 cursor-pointer text-black text-2xl font-black"><input type="radio" name="gender" value="남자" required class="w-8 h-8 accent-black"> <span class="!text-black">남자</span></label>
                    <label class="flex items-center gap-4 cursor-pointer text-black text-2xl font-black"><input type="radio" name="gender" value="여자" class="w-8 h-8 accent-black"> <span class="!text-black">여자</span></label>
                </div>
                
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeForm()" class="flex-1 py-6 border-[5px] border-black text-black font-black rounded-[30px] text-2xl hover:bg-gray-100">
                        <span class="!text-black">취소</span>
                    </button>
                    <button type="submit" id="submitBtn" class="flex-1 py-6 bg-black text-white font-black rounded-[30px] text-2xl">신청하기</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxucBoxzxnoc0OK03lczLS0IySUOkVC4huBiXkaeEBb0pI-CMmSifDqUjqjv8dWbqIZDQ/exec'; 

        // [최적화] 페이지 로드되자마자 백그라운드에서 데이터 미리 가져오기
        let cachedSlots = {};
        window.onload = () => {
            fetch(SCRIPT_URL + "?t=" + Date.now())
            .then(r => r.json())
            .then(data => { cachedSlots = data; });
        };

        function enterApp() {
            document.getElementById('landing').classList.add('hidden');
            document.getElementById('main').classList.remove('hidden');
            checkClosed(); // 입장 즉시 반영
            setInterval(checkClosed, 100); // 2초마다 실시간 확인
        }

        function checkClosed() {
            fetch(SCRIPT_URL + "?t=" + Date.now())
            .then(r => r.json())
            .then(closedSlots => {
                document.querySelectorAll('[data-key]').forEach(btn => {
                    const key = btn.getAttribute('data-key');
                    const timeOnly = key.split('_')[1];
                    if(closedSlots[key]) {
                        btn.disabled = true;
                        // 요청하신 디자인: 시간 (신청 마감) 표시 및 어두워지지 않음
                        btn.innerText = `${timeOnly} (신청 마감)`;
                    } else {
                        btn.disabled = false;
                        btn.innerText = timeOnly;
                    }
                });
            });
        }

        function openForm(d, t) {
            document.getElementById('f-day').value = d;
            document.getElementById('f-time').value = t;
            document.getElementById('modal-title').innerText = `${d} ${t}`;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeForm() { document.getElementById('modal').classList.add('hidden'); }

        document.getElementById('applyForm').addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "처리 중...";

            fetch(SCRIPT_URL, { method: 'POST', body: new FormData(e.target) })
            .then(res => res.text()).then(result => {
                if(result === "Success") {
                    location.reload(); 
                } else {
                    alert(result);
                    btn.disabled = false;
                    btn.innerText = "신청하기";
                }
            });
        });
    </script>
</body>
</html>

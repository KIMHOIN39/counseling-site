<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상담 신청</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-weight: 800 !important; color: #ffffff; }
        body { background-color: #000000; font-family: 'Pretendard', sans-serif; }
        .border-thick { border: 3px solid #ffffff; }
        .input-thick { border-bottom: 3px solid #000000 !important; }
        .btn-main { border: 3px solid #ffffff; transition: 0.2s; }
        .btn-main:hover { background-color: #ffffff; color: #000000 !important; }
        .btn-main:disabled { opacity: 0.3; cursor: not-allowed; background-color: #333; }
        .modal-capsule { background-color: #000000; color: #ffffff !important; padding: 10px 24px; border-radius: 9999px; display: inline-block; margin-bottom: 20px; }
        .hidden { display: none; }
        input { color: #000000 !important; }
    </style>
</head>
<body>

    <div id="landing" class="flex items-center justify-center min-h-screen">
        <button onclick="enterApp()" class="btn-main px-16 py-6 rounded-full text-2xl uppercase">상담 신청하기</button>
    </div>

    <div id="main" class="hidden max-w-6xl mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-10 mt-10">
            <div class="border-thick p-6 rounded-3xl text-center">
                <h2 class="text-2xl mb-8 border-b-4 border-white pb-2 inline-block">금요일</h2>
                <div class="flex flex-col gap-4" id="fri-list">
                    <script>
                        ['15:00','15:30','16:00','16:30','17:00','17:30','19:00'].forEach(t => {
                            document.write(`<button onclick="openForm('금요일', '${t}')" class="btn-main py-3 rounded-xl text-lg" data-key="금요일_${t}">${t}</button>`);
                        });
                    </script>
                </div>
            </div>
            <div class="border-thick p-6 rounded-3xl text-center">
                <h2 class="text-2xl mb-8 border-b-4 border-white pb-2 inline-block">토요일</h2>
                <div class="flex flex-col gap-4">
                    <script>
                        ['10:00','10:30','11:00','11:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','19:00'].forEach(t => {
                            document.write(`<button onclick="openForm('토요일', '${t}')" class="btn-main py-3 rounded-xl text-lg" data-key="토요일_${t}">${t}</button>`);
                        });
                    </script>
                </div>
            </div>
            <div class="border-thick p-6 rounded-3xl text-center">
                <h2 class="text-2xl mb-8 border-b-4 border-white pb-2 inline-block">일요일</h2>
                <div class="flex flex-col gap-4">
                    <script>
                        ['10:00','10:30','11:00','11:30'].forEach(t => {
                            document.write(`<button onclick="openForm('일요일', '${t}')" class="btn-main py-3 rounded-xl text-lg" data-key="일요일_${t}">${t}</button>`);
                        });
                    </script>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-white/20 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="bg-white p-10 rounded-[40px] w-full max-w-md border-[4px] border-black shadow-2xl">
            <div class="text-center"><span id="modal-title" class="modal-capsule text-xl font-black"></span></div>
            <form id="applyForm" class="space-y-6">
                <input type="hidden" name="day" id="f-day"><input type="hidden" name="time" id="f-time">
                <input type="text" name="name" placeholder="이름" required class="input-thick text-black text-lg p-2 outline-none w-full">
                <input type="number" name="age" placeholder="나이" min="1" required class="input-thick text-black text-lg p-2 outline-none w-full">
                <input type="text" name="attic" placeholder="다락방 (예: 홍길동 다락방)" required class="input-thick text-black text-lg p-2 outline-none w-full">
                <input type="tel" name="phone" placeholder="연락처 (01012345678)" required class="input-thick text-black text-lg p-2 outline-none w-full">
                <div class="flex gap-10 justify-center py-4 text-black">
                    <label class="flex items-center gap-3 cursor-pointer"><input type="radio" name="gender" value="남자" required class="w-5 h-5 accent-black"> <span style="color:black !important">남자</span></label>
                    <label class="flex items-center gap-3 cursor-pointer"><input type="radio" name="gender" value="여자" class="w-5 h-5 accent-black"> <span style="color:black !important">여자</span></label>
                </div>
                <div class="flex gap-4 pt-6">
                    <button type="button" onclick="closeForm()" class="flex-1 py-4 border-[3px] border-black text-black font-black rounded-2xl hover:bg-gray-100"><span style="color:black !important">취소</span></button>
                    <button type="submit" id="submitBtn" class="flex-1 py-4 bg-black text-white font-black rounded-2xl">신청하기</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyKWATdo_3m-RXSWjFNJZyVEg3mceIVTffT37REGQZO_D9zATieUOiFIwhk2NnfMHMlqQ/exec'; 

        function enterApp() {
            document.getElementById('landing').classList.add('hidden');
            document.getElementById('main').classList.remove('hidden');
            checkClosed();
        }

        function checkClosed() {
            fetch(SCRIPT_URL).then(r => r.json()).then(closedSlots => {
                document.querySelectorAll('[data-key]').forEach(btn => {
                    const key = btn.getAttribute('data-key');
                    if(closedSlots[key]) {
                        btn.disabled = true;
                        btn.innerText = `${key.split('_')[1]} (마감)`;
                    }
                });
            });
        }

        function openForm(d, t) {
            document.getElementById('f-day').value = d;
            document.getElementById('f-time').value = t;
            document.getElementById('modal-title').innerText = `${d} ${t} 신청`;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeForm() { document.getElementById('modal').classList.add('hidden'); }

        document.getElementById('applyForm').addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "처리 중...";
            fetch(SCRIPT_URL, { method: 'POST', body: new FormData(e.target) })
            .then(res => res.text()).then(result => {
                if(result === "Success") { location.reload(); } 
                else { alert(result); btn.disabled = false; btn.innerText = "신청하기"; }
            });
        });
    </script>
</body>
</html>

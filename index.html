<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAHWEH the HAPORETS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Serif+KR:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --main-bg: #363b3f; --accent: #ffffff; }
        body { background-color: var(--main-bg); font-family: 'Noto Serif KR', serif; overflow-x: hidden; color: var(--accent); }
        .font-title { font-family: 'Cinzel Decorative', cursive; }
        
        /* 버튼: 절대 줄바꿈 금지 및 큼직한 폰트 */
        .btn-main { 
            border: 4px solid var(--accent); 
            transition: 0.2s; 
            background: transparent; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            white-space: nowrap; /* 글자 한 줄 고정 */
            font-weight: 900;
            padding-top: 1rem;
            padding-bottom: 1rem;
        }
        .btn-main:hover { background-color: var(--accent); color: var(--main-bg) !important; }
        .btn-main:disabled { border-color: #ff4d4d; color: #ff4d4d !important; cursor: not-allowed; opacity: 1 !important; }
        
        /* 입력창: 폰트 통일 및 간격 확대 */
        .input-heavy { 
            border-bottom: 4px solid var(--accent) !important; 
            background: transparent; 
            outline: none; 
            border-top:0; border-left:0; border-right:0; border-radius: 0; 
            color: white !important; 
            font-family: 'Noto Serif KR', serif; 
            font-size: 1.5rem;
            padding: 1.5rem 0.5rem;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="landing" class="flex flex-col items-center justify-center min-h-screen p-6 text-center">
        <img src="crest.png.png" alt="Main Crest" class="w-64 md:w-96 mb-12 opacity-95">
        <h1 class="font-title text-5xl md:text-7xl mb-4 tracking-widest font-black">YAHWEH <span class="italic text-3xl">the</span></h1>
        <h2 class="font-title text-6xl md:text-9xl mb-14 uppercase tracking-tighter font-black">Haporets</h2>
        <div class="max-w-3xl mb-14 space-y-8 opacity-90 font-light leading-relaxed text-xl md:text-2xl">
            <p>길을 여는 자가 그들 앞에 올라가고 그들은 길을 열어 성문에 이르러서는 그리로 나갈 것이며 그들의 왕이 앞서 가며 여호와께서는 선두로 가시리라</p>
        </div>
        <button onclick="enterApp()" class="btn-main px-24 py-10 rounded-full text-4xl italic uppercase w-auto">상담 신청하기</button>
        <div class="mt-24 text-base tracking-[0.5em] opacity-40 font-title uppercase">Winter ☧ 2026</div>
    </div>

    <div id="main" class="hidden max-w-[1400px] mx-auto p-6 py-32 text-center">
        <div class="flex flex-col gap-40"> 
            <div id="friday-section">
                <img src="ark.png.png" alt="Friday" class="w-48 md:w-64 mx-auto mb-12 opacity-95">
                <h2 class="font-title text-5xl mb-12 border-b-4 border-white inline-block px-12 pb-4 font-black tracking-widest">FRIDAY</h2>
                <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-7 gap-6">
                    <script>
                        ['15:00','15:30','16:00','16:30','17:00','17:30','19:00'].forEach(t => {
                            document.write(`<button onclick="openForm('금요일', '${t}')" class="btn-main py-5 rounded-2xl text-2xl" data-key="금요일_${t}">${t}</button>`);
                        });
                    </script>
                </div>
            </div>

            <div id="saturday-section">
                <img src="crown.png.png" alt="Saturday" class="w-56 md:w-72 mx-auto mb-12 opacity-95">
                <h2 class="font-title text-6xl mb-14 border-b-4 border-white inline-block px-16 pb-4 font-black tracking-widest">SATURDAY</h2>
                <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-6">
                    <script>
                        ['10:00','10:30','11:00','11:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','19:00'].forEach(t => {
                            document.write(`<button onclick="openForm('토요일', '${t}')" class="btn-main py-6 rounded-3xl text-2xl" data-key="토요일_${t}">${t}</button>`);
                        });
                    </script>
                </div>
            </div>

            <div id="sunday-section">
                <img src="shofar.png.png" alt="Sunday" class="w-48 md:w-64 mx-auto mb-12 opacity-95">
                <h2 class="font-title text-5xl mb-12 border-b-4 border-white inline-block px-12 pb-4 font-black tracking-widest">SUNDAY</h2>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-6 max-w-3xl mx-auto">
                    <script>
                        ['10:00','10:30','11:00','11:30'].forEach(t => {
                            document.write(`<button onclick="openForm('일요일', '${t}')" class="btn-main py-5 rounded-2xl text-2xl" data-key="일요일_${t}">${t}</button>`);
                        });
                    </script>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/95 backdrop-blur-2xl flex items-center justify-center p-4 z-50">
        <div class="bg-[#363b3f] p-12 md:p-20 rounded-[60px] w-full max-w-2xl border-[6px] border-white text-center shadow-2xl">
            <h2 id="modal-title" class="font-title text-4xl mb-16 italic border-b-2 border-white pb-6 inline-block font-black"></h2>
            
            <form id="applyForm" class="space-y-16 text-left">
                <input type="hidden" id="f-day">
                <input type="hidden" id="f-time">
                <input type="text" id="f-name" placeholder="이름 (Name)" required minlength="2" class="input-heavy w-full">
                <input type="number" id="f-age" placeholder="나이 (Age)" min="1" max="120" required class="input-heavy w-full">
                <input type="text" id="f-attic" placeholder="다락방 (Darakbang)" required class="input-heavy w-full">
                <input type="tel" id="f-phone" placeholder="연락처 (01012345678)" required pattern="[0-9]{11}" class="input-heavy w-full">
                
                <div class="flex gap-20 justify-center py-8 text-3xl font-bold">
                    <label class="flex items-center gap-6 cursor-pointer"><input type="radio" name="gender" value="남자" required class="w-10 h-10 accent-white"> 남자</label>
                    <label class="flex items-center gap-6 cursor-pointer"><input type="radio" name="gender" value="여자" class="w-10 h-10 accent-white"> 여자</label>
                </div>
                
                <div class="flex gap-8 pt-10">
                    <button type="button" onclick="closeForm()" class="flex-1 py-6 border-[4px] border-white rounded-3xl text-3xl font-black">취소</button>
                    <button type="submit" id="submitBtn" class="flex-1 py-6 bg-white text-[#363b3f] rounded-3xl text-3xl font-black">신청하기</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBa66Q5Ap0btmupxISOQfNsV8y5JUQAG2o",
            authDomain: "kimhoin.firebaseapp.com",
            projectId: "kimhoin",
            storageBucket: "kimhoin.firebasestorage.app",
            messagingSenderId: "143951884772",
            appId: "1:143951884772:web:991545d9577a7a634c17f1",
            measurementId: "G-FZDNYD4QCT"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection("appointments").onSnapshot((snapshot) => {
            const closedSlots = {};
            snapshot.forEach((doc) => {
                const data = doc.data();
                closedSlots[`${data.day}_${data.time}`] = true;
            });
            document.querySelectorAll('[data-key]').forEach(btn => {
                const key = btn.getAttribute('data-key');
                const timeOnly = key.split('_')[1];
                if(closedSlots[key]) {
                    btn.disabled = true;
                    btn.innerHTML = `<span style="white-space: nowrap;">${timeOnly} (신청 마감)</span>`;
                } else {
                    btn.disabled = false;
                    btn.innerText = timeOnly;
                }
            });
        });

        function enterApp() { document.getElementById('landing').classList.add('hidden'); document.getElementById('main').classList.remove('hidden'); window.scrollTo(0,0); }
        function openForm(d, t) { 
            document.getElementById('f-day').value = d; 
            document.getElementById('f-time').value = t; 
            document.getElementById('modal-title').innerText = `${d} ${t}`; 
            document.getElementById('modal').classList.remove('hidden'); 
            document.body.style.overflow = 'hidden';
        }
        function closeForm() { 
            document.getElementById('modal').classList.add('hidden'); 
            document.body.style.overflow = 'auto';
        }

        document.getElementById('applyForm').addEventListener('submit', async e => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const day = document.getElementById('f-day').value;
            const time = document.getElementById('f-time').value;
            btn.disabled = true; btn.innerText = "처리 중...";

            try {
                const q = await db.collection("appointments").where("day", "==", day).where("time", "==", time).get();
                if (!q.empty) { alert("그 사이에 마감되었습니다!"); btn.disabled = false; return; }

                await db.collection("appointments").add({
                    day: day, time: time,
                    name: document.getElementById('f-name').value,
                    age: document.getElementById('f-age').value,
                    attic: document.getElementById('f-attic').value + " 다락방",
                    phone: document.getElementById('f-phone').value,
                    gender: document.querySelector('input[name="gender"]:checked').value,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("신청이 완료되었습니다!");
                closeForm();
                document.getElementById('applyForm').reset();
            } catch (err) { alert("오류: " + err.message); }
            finally { btn.disabled = false; btn.innerText = "신청하기"; }
        });
    </script>
</body>
</html>
